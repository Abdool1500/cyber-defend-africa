{% extends "base.html" %}
{% block title %}Request a Consultation · Cyber Defend Africa{% endblock %}
{% block content %}
<div class="container py-5" style="max-width: 640px;">
  <h1 class="h3 mb-2">Request a Consultation</h1>
  <form method="post" novalidate>
    {% csrf_token %}
    {% for field in form %}
    <div class="mb-3">
      <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
      {{ field }}
      {% for error in field.errors %}
      <div class="text-danger small mt-1">{{ error }}</div>
      {% endfor %}
    </div>
    {% endfor %}
    <button type="submit" class="btn btn-cda-primary">Request Consultation</button>
  </form>
</div>
{% endblock %}
