<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Server Error · Cyber Defend Africa</title>
  <style>
    body { background: #060b18; color: #e6ecf5; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .box { text-align: center; max-width: 480px; padding: 2.5rem; background: #0f1b30; border: 1px solid rgba(148, 163, 184, 0.18); border-radius: 0.75rem; }
    h1 { font-size: 3rem; font-weight: 700; margin: 0 0 0.25rem; }
    h2 { font-size: 1.25rem; margin: 0 0 1rem; }
    p { color: #94a3b8; margin: 0 0 1.5rem; }
    .actions { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    .btn { display: inline-block; padding: 0.5rem 1.25rem; border-radius: 0.375rem; text-decoration: none; font-weight: 500; cursor: pointer; border: 1px solid transparent; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-outline { background: transparent; color: #e6ecf5; border-color: rgba(148, 163, 184, 0.4); }
  </style>
</head>
<body>
  <div class="box">
    <h1>500</h1>
    <h2>Server Error</h2>
    <p>Something went wrong on our end. Our team has been notified — please try again shortly.</p>
    <div class="actions">
      <button type="button" class="btn btn-primary" onclick="location.reload()">Try Again</button>
      <a href="/" class="btn btn-outline">Back to Home</a>
    </div>
  </div>
</body>
</html>
