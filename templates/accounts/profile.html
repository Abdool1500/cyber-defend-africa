{% extends "base.html" %}
{% block title %}Your profile · Cyber Defend Africa{% endblock %}
{% block content %}
<div class="container py-5" style="max-width: 480px;">
  <h1 class="h3 mb-4">Your profile</h1>
  <form method="post" novalidate>
    {% csrf_token %}
    {% for field in form %}
    <div class="mb-3">
      <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
      {{ field }}
      {% for error in field.errors %}
      <div class="text-danger small mt-1">{{ error }}</div>
      {% endfor %}
    </div>
    {% endfor %}
    <button type="submit" class="btn btn-cda-primary w-100">Save changes</button>
  </form>
  <a href="{% url 'accounts:password_change' %}" class="d-inline-block mt-3 small">Change password</a>
</div>
{% endblock %}
